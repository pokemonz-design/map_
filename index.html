<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  
  <style>
    :root {
      --orange: #e85f00;
      --black: #111111;
      --white: #ffffff;
      --page-bg: #f6f4f1;

      --risk-low: #63be7b;
      --risk-medium-start: #ffeb84;
      --risk-medium-end: #f6b44c;
      --risk-high-start: #f68b50;
      --risk-high-end: #d33e40;

      --popup-low: #91d5a0;
      --popup-medium: #e7bc4b;
      --popup-high: #bd3437;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      color: var(--black);
      background: var(--page-bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    button {
      font: inherit;
    }

    .heatmap {
      position: relative;
      width: 757px;
      height: 580px;
      max-width: 100%;
      margin: 0 auto;
      overflow: hidden;
      background: var(--white);
    }

    /* Верхний блок */

    .heatmap__header {
      height: 145px;
      padding: 12px 10px 10px;
      overflow: hidden;
    }

    .heatmap__eyebrow {
      margin: 0 0 7px;
      color: var(--orange);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: 0.035em;
      text-transform: uppercase;
    }

    .heatmap__title {
      margin: 0;
      color: var(--black);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.1;
    }

    .heatmap__lead {
      max-width: 730px;
      margin: 9px 0 0;
      color: var(--black);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.28;
    }

    .heatmap__lead strong {
      color: var(--orange);
    }

    /* Таблица */

    .heatmap__body {
      width: 100%;
      height: 435px;
      padding: 0 6px 6px;
      overflow: hidden;
    }

    .heatmap-table {
      width: 100%;
      height: 429px;
      margin: 0;
      border-collapse: separate;
      border-spacing: 3px;
      table-layout: fixed;
    }

    .heatmap-table th,
    .heatmap-table td {
      padding: 0;
    }

    .heatmap-table thead th {
      height: 64px;
      padding: 5px 4px;
      color: var(--black);
      background: var(--white);
      border-bottom: 2px solid var(--black);

      font-size: 16px;
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
      vertical-align: middle;

      white-space: normal;
      overflow-wrap: normal;
      word-break: normal;
      hyphens: auto;
    }

    .heatmap-table thead th:first-child {
      width: 96px;
      min-width: 96px;
      font-size: 15px;
      text-align: left;
    }

    .heatmap-table tbody th {
      width: 96px;
      min-width: 96px;
      height: 69px;
      padding: 7px;

      color: var(--white);
      background: var(--orange);

      font-size: 9px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: 0.025em;
      text-transform: uppercase;

      text-align: left;
      vertical-align: middle;

      white-space: normal;
      overflow-wrap: anywhere;
      word-break: normal;
    }

    .heatmap-cell {
      height: 69px;
      padding: 0;
      vertical-align: middle;
    }

    /* Цветные ячейки */

    .risk-cell {
      display: flex;
      align-items: center;
      justify-content: center;

      width: 100%;
      height: 69px;
      margin: 0;
      padding: 7px;

      border: 0;
      border-radius: 0;

      font-size: 10px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0.035em;
      text-align: center;
      text-transform: uppercase;

      cursor: pointer;

      transition:
        filter 0.15s ease,
        box-shadow 0.15s ease,
        transform 0.15s ease;

      appearance: none;
      -webkit-appearance: none;
    }

    .risk-cell:hover {
      position: relative;
      z-index: 2;
      filter: brightness(1.04);
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.18);
      transform: translateY(-1px);
    }

    .risk-cell:focus-visible {
      position: relative;
      z-index: 3;
      outline: 3px solid var(--black);
      outline-offset: 1px;
    }

    .risk-cell--low {
      color: #123b20;
      background: var(--risk-low);
    }

    .risk-cell--medium {
      color: #493900;
      background:
        linear-gradient(
          135deg,
          var(--risk-medium-start) 0%,
          #ffdf63 56%,
          var(--risk-medium-end) 100%
        );
    }

    .risk-cell--high {
      color: var(--white);
      background:
        linear-gradient(
          135deg,
          var(--risk-high-start) 0%,
          #ef5b5d 54%,
          var(--risk-high-end) 100%
        );
    }

    /* Затемнение */

    .detail-overlay {
      position: absolute;
      inset: 0;
      z-index: 100;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 24px;

      background: rgba(10, 10, 10, 0.54);

      opacity: 0;
      visibility: hidden;
      pointer-events: none;

      transition:
        opacity 0.18s ease,
        visibility 0.18s ease;
    }

    .detail-overlay.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* Раскрытая карточка */

    .detail-card {
      position: relative;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      width: 430px;
      min-height: 250px;
      max-width: calc(100% - 30px);
      padding: 34px 34px 32px;

      color: var(--white);
      background: var(--popup-high);

      text-align: center;

      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.36);
      transform: translateY(8px) scale(0.97);

      transition:
        transform 0.2s ease,
        background 0.15s ease;
    }

    .detail-overlay.is-visible .detail-card {
      transform: translateY(0) scale(1);
    }

    .detail-card--low {
      color: #123b20;
      background: var(--popup-low);
    }

    .detail-card--medium {
      color: var(--white);
      background: var(--popup-medium);
      text-shadow: 0 1px 1px rgba(90, 55, 0, 0.22);
    }

    .detail-card--high {
      color: var(--white);
      background: var(--popup-high);
    }

    .detail-card__close {
      position: absolute;
      top: 10px;
      right: 10px;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 32px;
      height: 32px;
      padding: 0;

      color: currentColor;
      background: rgba(255, 255, 255, 0.18);
      border: 0;

      font-size: 24px;
      font-weight: 400;
      line-height: 1;

      cursor: pointer;
    }

    .detail-card--low .detail-card__close {
      background: rgba(255, 255, 255, 0.38);
    }

    .detail-card__close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .detail-card__close:focus-visible {
      outline: 3px solid var(--black);
      outline-offset: 2px;
    }

    .detail-card__level {
      margin: 0 0 14px;

      font-size: 13px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0.06em;
      text-transform: uppercase;

      opacity: 0.88;
    }

    .detail-card__title {
      margin: 0 0 16px;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 21px;
      font-weight: 700;
      line-height: 1.18;
    }

    .detail-card__text {
      max-width: 350px;
      margin: 0;

      font-size: 18px;
      font-weight: 400;
      line-height: 1.45;
      text-align: center;
    }

    @media (max-width: 756px) {
      .heatmap {
        width: 100%;
      }

      .heatmap__eyebrow {
        font-size: 15px;
      }

      .heatmap__lead {
        font-size: 15px;
      }

      .heatmap-table thead th {
        font-size: 13px;
      }

      .heatmap-table thead th:first-child {
        font-size: 12px;
      }

      .detail-card {
        width: 390px;
        min-height: 230px;
        padding: 34px 24px 28px;
      }

      .detail-card__text {
        font-size: 17px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .risk-cell,
      .detail-overlay,
      .detail-card {
        transition: none;
      }
    }
  </style>
</head>

<body>

  <main class="heatmap" id="heatmap">

    <header class="heatmap__header">
      <p class="heatmap__eyebrow">
        Интерактивная карта профессиональных рисков
      </p>



      <p class="heatmap__lead">
        <strong>Нажмите на ячейку</strong>, чтобы открыть вывод крупным шрифтом.
        Закройте карточку крестиком, клавишей Escape или кликом за ее пределами.
      </p>
    </header>

    <section class="heatmap__body">
      <table class="heatmap-table">
        <thead>
          <tr>
            <th scope="col">Ловушка</th>
            <th scope="col">Бюджетирование</th>
            <th scope="col">Управление ликвидностью</th>
            <th scope="col">Инвестиции</th>
            <th scope="col">Управленческая отчетность</th>
            <th scope="col">Консолидация</th>
          </tr>
        </thead>

        <tbody id="heatmapBody"></tbody>
      </table>
    </section>

    <div
      class="detail-overlay"
      id="detailOverlay"
      aria-hidden="true"
    >
      <article
        class="detail-card"
        id="detailCard"
        role="dialog"
        aria-modal="true"
        aria-labelledby="detailTitle"
        aria-describedby="detailText"
      >
        <button
          class="detail-card__close"
          id="detailClose"
          type="button"
          aria-label="Закрыть вывод"
        >
          ×
        </button>

        <p class="detail-card__level" id="detailLevel"></p>

        <h2 class="detail-card__title" id="detailTitle"></h2>

        <p class="detail-card__text" id="detailText"></p>
      </article>
    </div>

  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const rows = [
        {
          trap: "Точность",
          cells: [
            {
              area: "Бюджетирование",
              level: "Высокий",
              risk: "high",
              text: "План выглядит точным, но быстро теряет актуальность"
            },
            {
              area: "Управление ликвидностью",
              level: "Высокий",
              risk: "high",
              text: "Кассовый разрыв обнаруживают, когда изменить график платежей уже сложно"
            },
            {
              area: "Инвестиции",
              level: "Средний",
              risk: "medium",
              text: "Руководству нужна не точная сумма, а диапазон возможных результатов"
            },
            {
              area: "Управленческая отчетность",
              level: "Средний",
              risk: "medium",
              text: "Точность не компенсирует потерю времени от ожидания отчетов"
            },
            {
              area: "Консолидация",
              level: "Низкий",
              risk: "low",
              text: "Здесь точность чаще помогает, чем ограничивает"
            }
          ]
        },
        {
          trap: "Типовая методика",
          cells: [
            {
              area: "Бюджетирование",
              level: "Средний",
              risk: "medium",
              text: "Единая форма упрощает процесс, но может искажать экономику подразделений"
            },
            {
              area: "Управление ликвидностью",
              level: "Низкий",
              risk: "low",
              text: "Типовая методика здесь редко становится главным ограничением"
            },
            {
              area: "Инвестиции",
              level: "Средний",
              risk: "medium",
              text: "Методика должна учитывать экономику конкретного проекта"
            },
            {
              area: "Управленческая отчетность",
              level: "Высокий",
              risk: "high",
              text: "Отчет формально заполнен, но не обеспечивает руководство конкретной информацией"
            },
            {
              area: "Консолидация",
              level: "Средний",
              risk: "medium",
              text: "Стандарт нужен, но его следует адаптировать под структуру группы"
            }
          ]
        },
        {
          trap: "Осторожность",
          cells: [
            {
              area: "Бюджетирование",
              level: "Средний",
              risk: "medium",
              text: "Осторожный бюджет может превратиться в ориентир на минимальный результат"
            },
            {
              area: "Управление ликвидностью",
              level: "Средний",
              risk: "medium",
              text: "Ликвидность защищена, но свободные деньги работают неэффективно"
            },
            {
              area: "Инвестиции",
              level: "Высокий",
              risk: "high",
              text: "Компания избегает не только потерь, но и возможностей роста"
            },
            {
              area: "Управленческая отчетность",
              level: "Низкий",
              risk: "low",
              text: "Риск невелик, если CFO ясно показывает допущения"
            },
            {
              area: "Консолидация",
              level: "Низкий",
              risk: "low",
              text: "Профессиональная осторожность чаще снижает риск ошибки"
            }
          ]
        },
        {
          trap: "Общая прибыль",
          cells: [
            {
              area: "Бюджетирование",
              level: "Средний",
              risk: "medium",
              text: "План не показывает, какие направления бизнеса должны обеспечить результат"
            },
            {
              area: "Управление ликвидностью",
              level: "Низкий",
              risk: "low",
              text: "Общая прибыль не показывает, где именно возникают разрывы ликвидности и какие направления потребляют денежный ресурс"
            },
            {
              area: "Инвестиции",
              level: "Средний",
              risk: "medium",
              text: "Собственник не понимает, создает ли инвестиция дополнительную стоимость"
            },
            {
              area: "Управленческая отчетность",
              level: "Высокий",
              risk: "high",
              text: "Общая прибыль скрывает источники результата и не позволяет управлять ими"
            },
            {
              area: "Консолидация",
              level: "Средний",
              risk: "medium",
              text: "Хороший результат группы может скрывать хронически убыточные направления и юниты"
            }
          ]
        },
        {
          trap: "Бухгалтерская логика",
          cells: [
            {
              area: "Бюджетирование",
              level: "Средний",
              risk: "medium",
              text: "Риск возрастате, если в бюджете не учитывают факторы, которые формируют выручку, затраты и денежный поток"
            },
            {
              area: "Управление ликвидностью",
              level: "Низкий",
              risk: "low",
              text: "Бухгалтерская логика редко становится здесь основной проблемой"
            },
            {
              area: "Инвестиции",
              level: "Средний",
              risk: "medium",
              text: "Операционные и инвестиционные расходы могут быть классифицированы неверно."
            },
            {
              area: "Управленческая отчетность",
              level: "Высокий",
              risk: "high",
              text: "Отчетность сходится, но не объясняет собственнику кто принес прибыль"
            },
            {
              area: "Консолидация",
              level: "Высокий",
              risk: "high",
              text: "Бухгалтерская форма иногда может подменять экономический смысл операции"
            }
          ]
        }
      ];

      const heatmapBody = document.getElementById("heatmapBody");

      const overlay = document.getElementById("detailOverlay");
      const card = document.getElementById("detailCard");
      const closeButton = document.getElementById("detailClose");

      const detailLevel = document.getElementById("detailLevel");
      const detailTitle = document.getElementById("detailTitle");
      const detailText = document.getElementById("detailText");

      let lastActiveButton = null;

      function createHeatmap() {
        rows.forEach(function (row) {
          const tableRow = document.createElement("tr");

          const rowHeader = document.createElement("th");
          rowHeader.scope = "row";
          rowHeader.textContent = row.trap;

          tableRow.appendChild(rowHeader);

          row.cells.forEach(function (cell) {
            const tableCell = document.createElement("td");
            tableCell.className = "heatmap-cell";

            const button = document.createElement("button");
            button.type = "button";
            button.className = "risk-cell risk-cell--" + cell.risk;
            button.textContent = cell.level;

            button.setAttribute(
              "aria-label",
              row.trap + ", " + cell.area + ". " +
              cell.level + " риск. Открыть вывод."
            );

            button.addEventListener("click", function () {
              openDetail(row.trap, cell, button);
            });

            tableCell.appendChild(button);
            tableRow.appendChild(tableCell);
          });

          heatmapBody.appendChild(tableRow);
        });
      }

      function openDetail(trap, cell, sourceButton) {
        lastActiveButton = sourceButton;

        detailLevel.textContent = cell.level + " риск";
        detailTitle.textContent = trap + " × " + cell.area;
        detailText.textContent = cell.text;

        card.className = "detail-card detail-card--" + cell.risk;

        overlay.classList.add("is-visible");
        overlay.setAttribute("aria-hidden", "false");

        closeButton.focus();
      }

      function closeDetail() {
        overlay.classList.remove("is-visible");
        overlay.setAttribute("aria-hidden", "true");

        if (lastActiveButton) {
          lastActiveButton.focus();
        }
      }

      closeButton.addEventListener("click", closeDetail);

      overlay.addEventListener("click", function (event) {
        if (event.target === overlay) {
          closeDetail();
        }
      });

      document.addEventListener("keydown", function (event) {
        if (
          event.key === "Escape" &&
          overlay.classList.contains("is-visible")
        ) {
          closeDetail();
        }
      });

      createHeatmap();
    });
  </script>

</body>
</html>
