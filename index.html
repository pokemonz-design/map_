<style>
  :root {
    --brand-orange: #e85f00;
    --brand-orange-bright: #ff7a16;

    --black: #080808;
    --white: #ffffff;
    --page-bg: #f6f4f1;
    --gray-dark: #4f4f4f;
    --gray-light: #ece8e3;

    /* Лицевая сторона */
    --risk-low: #63be7b;
    --risk-medium: #ffdf63;
    --risk-high: #ef5b5d;

    /* Карточки после нажатия */
    --risk-low-back: #79c98d;
    --risk-medium-back: #e5b93e;
    --risk-high-back: #b92e31;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
  }

  body {
    color: var(--black);
    background: var(--page-bg);
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.35;
  }

  button {
    font: inherit;
  }

  /*
    Общий размер виджета — 757 × 580 px.
  */

  .heatmap {
    width: 757px;
    height: 580px;
    max-width: 100%;
    margin: 0 auto;
    overflow: hidden;
    background: var(--white);
  }

  /* Заголовок */

  .heatmap__header {
    height: 130px;
    padding: 16px 18px 10px;
    overflow: hidden;
  }

  .heatmap__eyebrow {
    margin: 0 0 6px;
    color: var(--brand-orange);
    font-size: 10px;
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .heatmap__title {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 27px;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  .heatmap__lead {
    max-width: 720px;
    margin: 9px 0 0;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 13px;
    line-height: 1.3;
  }

  .heatmap__lead strong {
    color: var(--brand-orange);
  }

  .heatmap__body {
    height: 450px;
    padding: 0 8px 8px;
    overflow: hidden;
  }

  /* Шкала риска */

  .heatmap-scale {
    width: 410px;
    max-width: 100%;
    height: 45px;
    margin: 0 0 4px 2px;
  }

  .heatmap-scale__title {
    margin: 0 0 3px;
    color: var(--gray-dark);
    font-size: 9px;
    font-weight: 800;
    line-height: 1.1;
  }

  .heatmap-scale__labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 3px;
    color: var(--gray-dark);
    font-size: 8px;
    font-weight: 700;
    line-height: 1;
  }

  .heatmap-scale__bar {
    height: 11px;
    background:
      linear-gradient(
        90deg,
        #63be7b 0%,
        #a8d76d 25%,
        #ffeb84 50%,
        #f6b44c 74%,
        #ef5b5d 100%
      );
    border: 1px solid rgba(0, 0, 0, 0.12);
  }

  /* Обертка таблицы — без прокрутки */

  .heatmap__scroll {
    width: 100%;
    height: 395px;
    overflow: hidden;
    padding: 0;
  }

  .heatmap-table {
    width: 100%;
    height: 395px;
    margin: 0;
    border-collapse: separate;
    border-spacing: 3px;
    table-layout: fixed;
  }

  .heatmap-table th,
  .heatmap-table td {
    vertical-align: middle;
  }

  /*
    Исправлен ошибочный селектор ". {".
  */

  .heatmap-table thead th {
    height: 48px;
    padding: 4px 3px;
    color: var(--black);
    background: var(--white);
    border-bottom: 2px solid var(--black);
    font-size: 9px;
    font-weight: 700;
    line-height: 1.12;
    text-align: center;
    overflow-wrap: break-word;
  }

  .heatmap-table thead th:first-child {
    width: 92px;
    min-width: 92px;
    color: var(--black);
    background: var(--white);
    text-align: left;
    border-bottom: 2px solid var(--black);
  }

  /* Первый столбец */

  .heatmap-table tbody th {
    width: 92px;
    min-width: 92px;
    height: 66px;
    padding: 7px;
    color: var(--white);
    background: var(--brand-orange);

    font-family: Arial, Helvetica, sans-serif;
    font-size: 9px;
    font-weight: 800;
    line-height: 1.12;
    letter-spacing: 0.025em;
    text-transform: uppercase;

    text-align: left;
    vertical-align: bottom;

    white-space: normal;
    overflow-wrap: anywhere;
    word-break: normal;
  }

  .heatmap-cell {
    height: 66px;
    padding: 0;
    background: transparent;
  }

  /* Интерактивная карточка */

  .risk-card {
    position: relative;
    display: block;
    width: 100%;
    height: 66px;
    padding: 0;
    overflow: hidden;
    color: inherit;
    background: transparent;
    border: 0;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .risk-card:focus-visible {
    outline: 2px solid var(--black);
    outline-offset: 1px;
  }

  .risk-card:hover {
    filter: brightness(1.025) saturate(1.03);
  }

  .risk-card__front,
  .risk-card__back {
    position: absolute;
    inset: 0;
    display: flex;
    width: 100%;
    height: 100%;
    padding: 7px;
    transition:
      opacity 0.15s ease,
      visibility 0.15s ease;
  }

  .risk-card__front {
    align-items: flex-end;
    justify-content: flex-start;
    opacity: 1;
    visibility: visible;
  }

  .risk-card__back {
    align-items: flex-start;
    justify-content: flex-start;
    opacity: 0;
    visibility: hidden;
  }

  .risk-card.is-open .risk-card__front {
    opacity: 0;
    visibility: hidden;
  }

  .risk-card.is-open .risk-card__back {
    opacity: 1;
    visibility: visible;
  }

  /* Лицевая сторона */

  .risk-card--low .risk-card__front {
    color: #123b20;
    background: var(--risk-low);
  }

  .risk-card--medium .risk-card__front {
    color: #493900;
    background:
      linear-gradient(
        135deg,
        #ffeb84 0%,
        var(--risk-medium) 56%,
        #f6b44c 100%
      );
  }

  .risk-card--high .risk-card__front {
    color: var(--white);
    background:
      linear-gradient(
        135deg,
        #f6a34c 0%,
        var(--risk-high) 48%,
        #c93638 100%
      );
  }

  /* Карточки после нажатия */

  .risk-card--low .risk-card__back {
    color: var(--white);
    background: var(--risk-low-back);
  }

  /*
    Желтый фон сделан светлее.
    Текст — белый.
  */

  .risk-card--medium .risk-card__back {
    color: var(--white);
    background: var(--risk-medium-back);
    text-shadow: 0 1px 1px rgba(90, 55, 0, 0.35);
  }

  .risk-card--high .risk-card__back {
    color: var(--white);
    background: var(--risk-high-back);
  }

  .risk-card__level {
    display: block;
    font-size: 9px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0.035em;
    text-transform: uppercase;
  }

  .risk-card__conclusion {
    display: block;
    margin: 0;
    font-size: 9px;
    font-weight: 700;
    line-height: 1.13;
    text-align: left;
    overflow-wrap: break-word;
  }

  @media (max-width: 756px) {
    .heatmap {
      width: 100%;
      height: 580px;
    }

    .heatmap__title {
      font-size: 24px;
    }

    .heatmap-table thead th,
    .heatmap-table tbody th,
    .risk-card__level,
    .risk-card__conclusion {
      font-size: 8px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .risk-card__front,
    .risk-card__back {
      transition: none;
    }
  }
</style>
